<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KAVYA Discount Coin</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:#f5f5f5;
}

.container{
    margin-top:50px;
}

.coin{
    width:250px;
    height:250px;
    border-radius:50%;
    cursor:pointer;
    transition:transform 2s;
    box-shadow:0 0 20px rgba(0,0,0,.2);
}

.flip{
    transform:rotateY(2160deg);
}

button{
    padding:12px 25px;
    font-size:18px;
    margin-top:20px;
}

#result{
    margin-top:30px;
    font-size:36px;
    font-weight:bold;
    color:#0057b8;
}
</style>
</head>

<body>

<div class="container">

<h2>🎉 KAVYA Lucky Discount Coin 🎉</h2>

<img src="Coin.png" id="coin" class="coin">

<br>

<button onclick="flipCoin()">
Flip Coin
</button>

<div id="result"></div>

</div>

<script>

function flipCoin(){

    let coin=document.getElementById("coin");

    coin.classList.add("flip");

    setTimeout(function(){

        let discount=Math.floor(Math.random()*10)+1;

        document.getElementById("result").innerHTML=
        "🎁 Congratulations! You Won "+discount+"% Discount";

        localStorage.setItem(
            "discountPlayed",
            discount
        );

        coin.classList.remove("flip");

    },2000);
}

</script>

</body>
</html>
