<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAI KAPEES INFRACON Pvt Ltd - Lucky Coin</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ==========================
         PAGE 1 - BILL NUMBER
    =========================== -->
    <div id="billPage" class="page active">

        <div class="container">

            <h1>JAI KAPEES INFRACON Pvt Ltd</h1>

            <h2>🎉 Lucky Coin Contest 🎉</h2>

            <div class="bill-box">

                <label for="billNo">Enter Bill Number</label>

                <input
                    type="text"
                    id="billNo"
                    placeholder="Enter Bill Number"
                    autocomplete="off"
                >

                <button id="continueBtn">
                    Continue
                </button>

            </div>

            <p id="billMessage" class="message"></p>

        </div>

    </div>



    <!-- ==========================
         PAGE 2 - LUCKY COIN
    =========================== -->

    <div id="coinPage" class="page">

        <div class="container">

            <h1>JAI KAPEES INFRACON Pvt Ltd</h1>

            <h2>🎉 Lucky Coin 🎉</h2>

            <p class="bill-display">
                Bill No :
                <strong id="displayBillNo"></strong>
            </p>

            <img
                src="Coin.png"
                id="coin"
                class="coin"
                alt="Lucky Coin"
            >

            <br><br>

            <button
                id="flipBtn"
                class="flipBtn">
                Flip Coin
            </button>

            <button
                id="nextBtn"
                class="playBtn">
                Next Person
            </button>

            <div id="result"></div>

        </div>

    </div>



    <!-- Loading Overlay -->

    <div id="loading" class="loading">

        <div class="loader"></div>

        <p>Please wait...</p>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
